<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Work Tracker">
<title>Work Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f4f0; --surface: #fff; --surface2: #f0ede8;
  --border: rgba(0,0,0,0.09); --border-strong: rgba(0,0,0,0.16);
  --text: #1a1916; --text-2: #5a5751; --text-3: #9a9791;
  --accent: #2d5a3d; --accent-light: #e8f0eb; --accent-mid: #4a7c5f;
  --danger: #c0392b; --danger-light: #fdf0ee;
  --warn: #b8750a; --warn-light: #fef8ee;
  --nav-h: 72px; --top-h: 56px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); font-size: 15px; }

/* ── Lock screen ── */
#lock {
  position: fixed; inset: 0; background: #1a1916; z-index: 999;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px;
}
#lock .l-title { font-family: 'DM Serif Display', serif; font-size: 24px; color: #fff; }
#lock .l-sub { font-size: 11px; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 0.12em; margin-top: -10px; }
#lock input {
  font-family: 'DM Sans', sans-serif; font-size: 22px; letter-spacing: 0.3em;
  width: 180px; padding: 12px 16px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.07); color: #fff; text-align: center; outline: none;
  margin-top: 12px;
}
#lock .l-btn {
  font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
  padding: 13px 40px; border-radius: 12px; border: none;
  background: var(--accent); color: #fff; cursor: pointer; width: 180px;
}
#lock .l-err { font-size: 12px; color: #e07070; opacity: 0; transition: opacity 0.2s; height: 16px; }

/* ── App shell ── */
#app { display: none; height: 100%; flex-direction: column; }
#app.show { display: flex; }

/* ── Top bar ── */
.topbar {
  height: var(--top-h); flex-shrink: 0;
  background: var(--surface); border-bottom: 0.5px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px; padding-top: env(safe-area-inset-top);
}
.topbar-title { font-family: 'DM Serif Display', serif; font-size: 18px; color: var(--text); }
.topbar-right { display: flex; align-items: center; gap: 10px; }
.sync-pill {
  display: flex; align-items: center; gap: 5px; font-size: 11px;
  color: var(--text-3); background: var(--surface2); padding: 4px 10px; border-radius: 20px;
}
.sync-dot { width: 6px; height: 6px; border-radius: 50%; background: #ccc; }
.sync-dot.online { background: #2d8a55; }
.sync-dot.syncing { background: #f0c040; animation: pulse 1s infinite; }
.sync-dot.error { background: #e07070; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }

/* ── Scroll content ── */
.content {
  flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
  padding: 16px 16px calc(var(--nav-h) + 16px + env(safe-area-inset-bottom));
}

/* ── Bottom nav ── */
.bottom-nav {
  height: var(--nav-h); flex-shrink: 0;
  background: var(--surface); border-top: 0.5px solid var(--border);
  display: flex; align-items: flex-start; justify-content: space-around;
  padding: 10px 0 env(safe-area-inset-bottom);
  position: fixed; bottom: 0; left: 0; right: 0;
}
.nav-item {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  flex: 1; cursor: pointer; padding: 4px 0; border: none; background: transparent;
  color: var(--text-3); transition: color 0.15s;
}
.nav-item.active { color: var(--accent); }
.nav-icon { font-size: 22px; line-height: 1; }
.nav-label { font-size: 10px; font-weight: 500; letter-spacing: 0.03em; }

/* ── Views ── */
.view { display: none; }
.view.active { display: block; }

/* ── Section label ── */
.sec-label {
  font-size: 11px; font-weight: 500; color: var(--text-3);
  text-transform: uppercase; letter-spacing: 0.1em;
  margin: 20px 0 8px;
}
.sec-label:first-child { margin-top: 0; }

/* ── Stat cards ── */
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 4px; }
.stat-card { background: var(--surface); border-radius: 14px; padding: 14px 16px; border: 0.5px solid var(--border); }
.stat-card .sv { font-size: 28px; font-weight: 300; color: var(--text); letter-spacing: -0.03em; line-height: 1; }
.stat-card .sl { font-size: 11px; color: var(--text-3); margin-top: 4px; }
.stat-card .sb { height: 3px; background: var(--surface2); border-radius: 2px; margin-top: 10px; }
.stat-card .sbf { height: 3px; border-radius: 2px; }
.stat-wide { grid-column: 1 / -1; }

/* ── Period card ── */
.period-card { background: var(--surface); border-radius: 14px; padding: 14px 16px; border: 0.5px solid var(--border); margin-bottom: 4px; }
.period-card label { font-size: 11px; color: var(--text-3); display: block; margin-bottom: 3px; }
.period-row { display: flex; gap: 10px; margin-bottom: 10px; }
.period-row > div { flex: 1; }
.period-card input[type=date], .period-card input[type=text] {
  width: 100%; font-family: 'DM Sans', sans-serif; font-size: 13px;
  padding: 8px 10px; border: 0.5px solid var(--border-strong); border-radius: 8px;
  background: var(--bg); color: var(--text); outline: none;
}
.pe-bar-bg { height: 5px; background: var(--surface2); border-radius: 3px; margin-top: 8px; }
.pe-bar-fill { height: 5px; background: var(--accent); border-radius: 3px; transition: width 0.5s; }
.pe-text { font-size: 11px; color: var(--text-2); margin-top: 5px; }

/* ── Project list ── */
.proj-card {
  background: var(--surface); border-radius: 14px; border: 0.5px solid var(--border);
  margin-bottom: 10px; overflow: hidden;
}
.proj-head {
  display: flex; align-items: center; gap: 10px; padding: 14px 16px; cursor: pointer;
}
.proj-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.proj-name { font-size: 14px; font-weight: 500; color: var(--text); flex: 1; line-height: 1.3; }
.proj-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
.badge { font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: 500; }
.b-high { background: #fdecea; color: #a02020; }
.b-medium { background: #fef3e2; color: #8a5a00; }
.b-low { background: #eaf5ee; color: #1e6e3c; }
.b-ns { background: #fdecea; color: #a02020; }
.b-ip { background: #fef3e2; color: #8a5a00; }
.b-wt { background: #f0ede8; color: #5a5751; }
.b-og { background: #eaf5ee; color: #1e6e3c; }
.b-cp { background: #e8f0eb; color: #2d5a3d; }
.proj-pct { font-size: 12px; font-weight: 500; color: var(--text-2); }
.proj-pbar { width: 60px; height: 3px; background: var(--surface2); border-radius: 2px; }
.proj-pbar-fill { height: 3px; border-radius: 2px; }
.proj-body { display: none; padding: 0 16px 14px; border-top: 0.5px solid var(--border); }
.proj-body.open { display: block; }
.proj-body-progress { padding: 10px 0 4px; font-size: 11px; color: var(--text-3); }

/* ── Tasks ── */
.task-item { display: flex; align-items: flex-start; gap: 12px; padding: 10px 0; border-bottom: 0.5px solid var(--border); }
.task-item:last-of-type { border-bottom: none; }
.task-cb { width: 20px; height: 20px; border-radius: 6px; border: 1.5px solid var(--border-strong); flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; margin-top: 1px; transition: all 0.15s; background: transparent; position: relative; }
.task-cb.done { background: var(--accent); border-color: var(--accent); }
.task-cb.done::after { content:''; position:absolute; width:7px; height:4px; border-left:2px solid #fff; border-bottom:2px solid #fff; transform:rotate(-45deg) translate(1px,-1px); }
.task-info { flex: 1; }
.task-text { font-size: 13px; color: var(--text); line-height: 1.4; }
.task-text.done { color: var(--text-3); text-decoration: line-through; }
.task-target { font-size: 11px; color: var(--text-3); margin-top: 2px; }
.task-del { background: none; border: none; cursor: pointer; color: var(--text-3); font-size: 16px; padding: 2px 4px; flex-shrink: 0; }
.empty-tasks { font-size: 13px; color: var(--text-3); font-style: italic; padding: 8px 0; }

/* ── Add task ── */
.add-task-area { margin-top: 10px; display: flex; flex-direction: column; gap: 6px; }
.add-task-area input {
  font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 10px 12px;
  border: 0.5px solid var(--border-strong); border-radius: 10px;
  background: var(--bg); color: var(--text); outline: none; width: 100%;
}
.add-task-area input:focus { border-color: var(--accent-mid); }
.add-row-btns { display: flex; gap: 8px; }
.btn-add { font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; padding: 10px; border-radius: 10px; border: none; background: var(--accent); color: #fff; cursor: pointer; flex: 1; }
.btn-edit-proj { font-family: 'DM Sans', sans-serif; font-size: 12px; padding: 10px 14px; border-radius: 10px; border: 0.5px solid var(--border-strong); background: transparent; color: var(--text-2); cursor: pointer; }

/* ── Filter strip ── */
.filter-strip { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 12px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
.filter-strip::-webkit-scrollbar { display: none; }
.fpill { font-size: 12px; padding: 6px 14px; border-radius: 20px; border: 0.5px solid var(--border-strong); background: transparent; color: var(--text-2); cursor: pointer; white-space: nowrap; flex-shrink: 0; }
.fpill.active { background: var(--accent-light); color: var(--accent); border-color: var(--accent-light); font-weight: 500; }

/* ── Compass blocks ── */
.compass-block { border-radius: 14px; padding: 16px; margin-bottom: 12px; border: 0.5px solid; }
.cb-danger { background: var(--danger-light); border-color: rgba(192,57,43,0.2); }
.cb-warn { background: var(--warn-light); border-color: rgba(184,117,10,0.2); }
.cb-ok { background: var(--accent-light); border-color: rgba(45,90,61,0.15); }
.cb-neutral { background: var(--surface2); border-color: var(--border); }
.compass-block h3 { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
.cb-danger h3 { color: var(--danger); }
.cb-warn h3 { color: var(--warn); }
.cb-ok h3 { color: var(--accent); }
.cb-neutral h3 { color: var(--text-3); }
.c-item { padding: 8px 0; border-bottom: 0.5px solid rgba(0,0,0,0.08); }
.c-item:last-child { border-bottom: none; }
.c-proj { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-3); margin-bottom: 2px; }
.cb-danger .c-proj { color: var(--danger); }
.cb-warn .c-proj { color: var(--warn); }
.c-task { font-size: 13px; color: var(--text); }
.c-date { font-size: 11px; color: var(--text-3); margin-top: 2px; }
.cb-danger .c-date { color: var(--danger); }
.cb-warn .c-date { color: var(--warn); }

/* ── Report ── */
.report-header { background: var(--text); border-radius: 14px; padding: 20px; margin-bottom: 12px; }
.report-header h2 { font-family: 'DM Serif Display', serif; font-size: 20px; color: #fff; margin-bottom: 2px; }
.report-header p { font-size: 12px; color: rgba(255,255,255,0.45); }
.rh-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
.rh-stat .rv { font-size: 20px; font-weight: 300; color: #7bc99a; }
.rh-stat .rl { font-size: 10px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.08em; }
.report-section { background: var(--surface); border-radius: 14px; border: 0.5px solid var(--border); padding: 16px; margin-bottom: 12px; }
.report-section h3 { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-3); margin-bottom: 12px; padding-bottom: 8px; border-bottom: 0.5px solid var(--border); }
.rpr { padding: 10px 0; border-bottom: 0.5px solid var(--border); }
.rpr:last-child { border-bottom: none; }
.rpr-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
.rpr-title { font-size: 13px; font-weight: 500; color: var(--text); flex: 1; margin-right: 8px; line-height: 1.3; }
.rpr-pct { font-size: 16px; font-weight: 300; color: var(--text); flex-shrink: 0; }
.rpr-bar-bg { height: 3px; background: var(--surface2); border-radius: 2px; margin: 4px 0; }
.rpr-bar { height: 3px; border-radius: 2px; }
.rpr-tasks { font-size: 11px; color: var(--text-3); margin-top: 4px; line-height: 1.5; }
.rpr-badges { display: flex; gap: 4px; margin-top: 4px; }
.btn-print { font-family: 'DM Sans', sans-serif; width: 100%; padding: 14px; border-radius: 12px; border: none; background: var(--accent); color: #fff; font-size: 14px; font-weight: 500; cursor: pointer; margin-bottom: 10px; }
.btn-export { font-family: 'DM Sans', sans-serif; width: 100%; padding: 14px; border-radius: 12px; border: 0.5px solid var(--border-strong); background: transparent; color: var(--text-2); font-size: 14px; cursor: pointer; margin-bottom: 16px; }

/* ── New project FAB ── */
.fab { position: fixed; bottom: calc(var(--nav-h) + 16px + env(safe-area-inset-bottom)); right: 16px; width: 52px; height: 52px; border-radius: 50%; background: var(--accent); border: none; color: #fff; font-size: 26px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 16px rgba(45,90,61,0.35); z-index: 50; }

/* ── Modal ── */
.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: flex-end; justify-content: center; }
.modal-bg.show { display: flex; }
.modal { background: var(--surface); border-radius: 20px 20px 0 0; padding: 20px 20px calc(20px + env(safe-area-inset-bottom)); width: 100%; max-height: 85vh; overflow-y: auto; }
.modal-handle { width: 36px; height: 4px; background: var(--border-strong); border-radius: 2px; margin: 0 auto 16px; }
.modal h3 { font-family: 'DM Serif Display', serif; font-size: 20px; margin-bottom: 18px; color: var(--text); }
.form-group { margin-bottom: 14px; }
.form-group label { font-size: 11px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.08em; display: block; margin-bottom: 5px; }
.form-group input, .form-group select, .form-group textarea { width: 100%; font-family: 'DM Sans', sans-serif; font-size: 14px; padding: 11px 13px; border: 0.5px solid var(--border-strong); border-radius: 10px; background: var(--bg); color: var(--text); outline: none; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.modal-actions { display: flex; flex-direction: column; gap: 8px; margin-top: 20px; }
.modal-actions .btn-save { font-family: 'DM Sans', sans-serif; padding: 14px; border-radius: 12px; border: none; background: var(--accent); color: #fff; font-size: 14px; font-weight: 500; cursor: pointer; }
.modal-actions .btn-cancel { font-family: 'DM Sans', sans-serif; padding: 14px; border-radius: 12px; border: 0.5px solid var(--border-strong); background: transparent; color: var(--text-2); font-size: 14px; cursor: pointer; }
.modal-actions .btn-delete { font-family: 'DM Sans', sans-serif; padding: 12px; border-radius: 12px; border: none; background: var(--danger-light); color: var(--danger); font-size: 13px; cursor: pointer; display: none; }

/* ── Toast ── */
.toast { position: fixed; bottom: calc(var(--nav-h) + 12px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%); background: var(--text); color: #fff; padding: 9px 18px; border-radius: 20px; font-size: 13px; opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 300; white-space: nowrap; }
.toast.show { opacity: 1; }

@media print {
  #lock, .topbar, .bottom-nav, .fab, #toast { display: none !important; }
  .content { padding: 0; overflow: visible; }
  .view { display: none !important; }
  #view-report { display: block !important; }
}
</style>
</head>
<body>

<!-- Lock screen -->
<div id="lock">
  <div class="l-title">Work Tracker</div>
  <div class="l-sub">Khalid · SLS / DPM</div>
  <input type="password" id="pw-in" placeholder="••••" maxlength="10" inputmode="numeric"
    onkeydown="if(event.key==='Enter')checkPw()">
  <div class="l-err" id="pw-err">Incorrect passcode</div>
  <button class="l-btn" onclick="checkPw()">Unlock</button>
</div>

<!-- App -->
<div id="app">
  <!-- Top bar -->
  <div class="topbar">
    <div class="topbar-title" id="top-title">Overview</div>
    <div class="topbar-right">
      <div class="sync-pill"><div class="sync-dot" id="sync-dot"></div><span id="sync-lbl">...</span></div>
    </div>
  </div>

  <!-- Scrollable content -->
  <div class="content" id="content">

    <!-- DASHBOARD -->
    <div class="view active" id="view-dashboard">
      <div class="sec-label">Performance period</div>
      <div class="period-card">
        <div class="period-row">
          <div><label>Start</label><input type="date" id="period-start" onchange="savePeriod()"></div>
          <div><label>End</label><input type="date" id="period-end" onchange="savePeriod()"></div>
        </div>
        <label>Period name</label>
        <input type="text" id="period-name" placeholder="e.g. 2026 Annual Review" onchange="savePeriod()" style="margin-bottom:10px">
        <div class="pe-bar-bg"><div class="pe-bar-fill" id="pe-fill" style="width:0%"></div></div>
        <div class="pe-text" id="pe-text">Set dates above</div>
      </div>

      <div class="sec-label">Snapshot</div>
      <div class="stat-grid">
        <div class="stat-card">
          <div class="sv" id="sn-pct">0%</div>
          <div class="sl" id="sn-done">0 of 0 done</div>
          <div class="sb"><div class="sbf" id="sn-bar" style="background:var(--accent);width:0%"></div></div>
        </div>
        <div class="stat-card">
          <div class="sv" id="sn-projs">0</div>
          <div class="sl" id="sn-high">0 high priority</div>
        </div>
        <div class="stat-card">
          <div class="sv" id="sn-dl" style="font-size:20px;margin-top:2px">—</div>
          <div class="sl" id="sn-days">Next deadline</div>
        </div>
        <div class="stat-card">
          <div class="sv" id="sn-pending">0</div>
          <div class="sl">Pending actions</div>
        </div>
      </div>

      <div class="sec-label">Project progress</div>
      <div id="dash-projs"></div>
    </div>

    <!-- PORTFOLIO -->
    <div class="view" id="view-portfolio">
      <div class="filter-strip" id="filter-strip">
        <button class="fpill active" onclick="filterP('all',this)">All</button>
        <button class="fpill" onclick="filterP('high',this)">High priority</button>
        <button class="fpill" onclick="filterP('not-started',this)">Not started</button>
        <button class="fpill" onclick="filterP('in-progress',this)">In progress</button>
        <button class="fpill" onclick="filterP('ongoing',this)">Ongoing</button>
      </div>
      <div id="proj-list"></div>
    </div>

    <!-- COMPASS -->
    <div class="view" id="view-compass">
      <div id="compass-content"></div>
    </div>

    <!-- REPORT -->
    <div class="view" id="view-report">
      <button class="btn-print" onclick="window.print()">Print / Save as PDF</button>
      <button class="btn-export" onclick="exportJSON()">Export backup (.json)</button>
      <div id="report-content"></div>
    </div>

  </div><!-- /content -->

  <!-- FAB -->
  <button class="fab" id="fab" onclick="openAddProject()">+</button>

  <!-- Bottom nav -->
  <nav class="bottom-nav">
    <button class="nav-item active" id="nav-dashboard" onclick="nav('dashboard',this,'Overview')">
      <div class="nav-icon">⊞</div><div class="nav-label">Dashboard</div>
    </button>
    <button class="nav-item" id="nav-portfolio" onclick="nav('portfolio',this,'Portfolio')">
      <div class="nav-icon">≡</div><div class="nav-label">Portfolio</div>
    </button>
    <button class="nav-item" id="nav-compass" onclick="nav('compass',this,'Compass')">
      <div class="nav-icon">◎</div><div class="nav-label">Compass</div>
    </button>
    <button class="nav-item" id="nav-report" onclick="nav('report',this,'Report')">
      <div class="nav-icon">◻</div><div class="nav-label">Report</div>
    </button>
  </nav>
</div>

<!-- Modal -->
<div class="modal-bg" id="proj-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3 id="modal-title">New project</h3>
    <div class="form-group">
      <label>Project title</label>
      <input type="text" id="m-title" placeholder="e.g. Skills Strategy Workshop">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Status</label>
        <select id="m-status">
          <option value="not-started">Not started</option>
          <option value="in-progress">In progress</option>
          <option value="waiting">Waiting</option>
          <option value="ongoing">Ongoing</option>
          <option value="completed">Completed</option>
        </select>
      </div>
      <div class="form-group">
        <label>Priority</label>
        <select id="m-priority">
          <option value="high">High</option>
          <option value="medium" selected>Medium</option>
          <option value="low">Low</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Deadline</label>
        <input type="date" id="m-deadline">
      </div>
      <div class="form-group">
        <label>Category</label>
        <input type="text" id="m-category" placeholder="e.g. Workday">
      </div>
    </div>
    <div class="form-group">
      <label>Notes</label>
      <textarea id="m-notes" rows="2" placeholder="Context for your report..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-save" onclick="saveProject()">Save project</button>
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-delete" id="del-btn" onclick="deleteProject()">Delete project</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBMIkD65hJR8PN5AxV8c_l9MCWs2H6tq-Y",
  authDomain: "khalid-tracker.firebaseapp.com",
  projectId: "khalid-tracker",
  storageBucket: "khalid-tracker.firebasestorage.app",
  messagingSenderId: "344446804385",
  appId: "1:344446804385:web:98158a57f920debcedebe0"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);
const DOC_ID = "khalid-main";

const DEFAULT_PROJECTS = [
  { id:1, title:"Data, intelligence & reporting lead (SLS)", status:"not-started", priority:"high", deadline:"2026-04-14", category:"Role development", notes:"Foundational role-shaping work.", tasks:[] },
  { id:2, title:"Skills strategy workshop — 14 April", status:"not-started", priority:"high", deadline:"2026-04-14", category:"Skills Strategy", notes:"", tasks:[] },
  { id:3, title:"Argentina MCO — skills mapping pilot", status:"waiting", priority:"medium", deadline:"", category:"Skills Strategy", notes:"", tasks:[] },
  { id:4, title:"Mentoring programme (Workday)", status:"in-progress", priority:"medium", deadline:"", category:"Workday", notes:"", tasks:[] },
  { id:5, title:"JPO mentorship programme", status:"ongoing", priority:"low", deadline:"", category:"Mentoring", notes:"", tasks:[] },
  { id:6, title:"Digital learning hub (DLH)", status:"in-progress", priority:"medium", deadline:"", category:"Digital Learning", notes:"", tasks:[] },
  { id:7, title:"DPM skills working group", status:"in-progress", priority:"medium", deadline:"", category:"Skills Strategy", notes:"", tasks:[] },
  { id:8, title:"Workday skills analytics & gap analysis", status:"in-progress", priority:"medium", deadline:"", category:"Workday", notes:"", tasks:[] },
  { id:9, title:"Mandatory learning & compliance reporting", status:"ongoing", priority:"low", deadline:"", category:"Compliance", notes:"", tasks:[] }
];

let appData = { projects: JSON.parse(JSON.stringify(DEFAULT_PROJECTS)), period: { start:'', end:'', name:'' } };
let nextId = 10, expanded = new Set(), currentFilter = 'all', editingId = null, saveTimer = null;

// ── Lock ──
function checkPw() {
  const v = document.getElementById('pw-in').value;
  const err = document.getElementById('pw-err');
  if (v === '7786') {
    document.getElementById('lock').style.display = 'none';
    document.getElementById('app').classList.add('show');
    sessionStorage.setItem('kh_auth','1');
    initData();
  } else {
    err.style.opacity = '1';
    document.getElementById('pw-in').value = '';
    setTimeout(() => err.style.opacity = '0', 2000);
  }
}
window.checkPw = checkPw;

window.addEventListener('DOMContentLoaded', () => {
  if (sessionStorage.getItem('kh_auth') === '1') {
    document.getElementById('lock').style.display = 'none';
    document.getElementById('app').classList.add('show');
    initData();
  } else {
    setTimeout(() => document.getElementById('pw-in').focus(), 300);
  }
  document.getElementById('pw-in').addEventListener('keydown', e => { if(e.key==='Enter') checkPw(); });
});

// ── Sync ──
function setSyncStatus(s) {
  const dot=document.getElementById('sync-dot'), lbl=document.getElementById('sync-lbl');
  dot.className='sync-dot '+s;
  lbl.textContent = s==='online'?'Synced':s==='syncing'?'Saving...':'Offline';
}

async function initData() {
  setSyncStatus('syncing');
  try {
    const ref = doc(db,'tracker',DOC_ID);
    const snap = await getDoc(ref);
    if (snap.exists()) { appData = snap.data(); nextId = Math.max(...appData.projects.map(p=>p.id),9)+1; }
    else { await setDoc(ref, appData); }
    setSyncStatus('online');
    applyPeriodFields(); render();
    onSnapshot(ref, s => {
      if(s.exists()) { appData=s.data(); nextId=Math.max(...appData.projects.map(p=>p.id),9)+1; applyPeriodFields(); render(); setSyncStatus('online'); }
    }, () => setSyncStatus('error'));
  } catch(e) { setSyncStatus('error'); applyPeriodFields(); render(); }
}

function scheduleSave() {
  setSyncStatus('syncing');
  if(saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    try { await setDoc(doc(db,'tracker',DOC_ID), appData); setSyncStatus('online'); }
    catch(e) { setSyncStatus('error'); }
  }, 800);
}

// ── Helpers ──
const statusDot   = {'not-started':'#c0392b','in-progress':'#b8750a','waiting':'#8a9aaa','ongoing':'#2d8a55','completed':'#2d5a3d'};
const statusLabel = {'not-started':'Not started','in-progress':'In progress','waiting':'Waiting','ongoing':'Ongoing','completed':'Completed'};
const statusBadge = {'not-started':'b-ns','in-progress':'b-ip','waiting':'b-wt','ongoing':'b-og','completed':'b-cp'};
const priBadge    = {high:'b-high',medium:'b-medium',low:'b-low'};
const progColor   = p => p>=70?'#2d8a55':p>=35?'#b8750a':'#c0392b';

function pct(p) { const t=p.tasks.length,d=p.tasks.filter(x=>x.done).length; return t===0?0:Math.round((d/t)*100); }
function fmtDate(s) { if(!s) return ''; return new Date(s).toLocaleDateString('en-GB',{day:'numeric',month:'short'}); }
function toast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1800); }

// ── Period ──
function applyPeriodFields() {
  document.getElementById('period-start').value = appData.period?.start||'';
  document.getElementById('period-end').value   = appData.period?.end||'';
  document.getElementById('period-name').value  = appData.period?.name||'';
  updatePeriodBar();
}
window.savePeriod = function() {
  appData.period = { start:document.getElementById('period-start').value, end:document.getElementById('period-end').value, name:document.getElementById('period-name').value };
  scheduleSave(); updatePeriodBar();
};
function updatePeriodBar() {
  const s=appData.period?.start,e=appData.period?.end;
  if(!s||!e){document.getElementById('pe-text').textContent='Set dates above';return;}
  const start=new Date(s),end=new Date(e),today=new Date();
  const p=Math.max(0,Math.min(100,Math.round(((today-start)/(end-start))*100)));
  const dl=Math.max(0,Math.ceil((end-today)/86400000));
  document.getElementById('pe-fill').style.width=p+'%';
  document.getElementById('pe-text').textContent=p+'% elapsed · '+dl+' days left';
}

// ── Snapshot ──
function updateSnapshot() {
  let total=0,done=0,high=0,near=null,nearDiff=null;
  const today=new Date(); today.setHours(0,0,0,0);
  appData.projects.forEach(p=>{
    total+=p.tasks.length; done+=p.tasks.filter(t=>t.done).length;
    if(p.priority==='high') high++;
    if(p.deadline){const d=new Date(p.deadline),diff=Math.ceil((d-today)/86400000);if(!near||d<near){near=d;nearDiff=diff;}}
  });
  const pc=total===0?0:Math.round((done/total)*100);
  document.getElementById('sn-pct').textContent=pc+'%';
  document.getElementById('sn-done').textContent=done+' of '+total+' done';
  document.getElementById('sn-bar').style.width=pc+'%';
  document.getElementById('sn-projs').textContent=appData.projects.length;
  document.getElementById('sn-high').textContent=high+' high priority';
  if(near){document.getElementById('sn-dl').textContent=fmtDate(appData.projects.find(p=>p.deadline&&new Date(p.deadline).getTime()===near.getTime())?.deadline||'');document.getElementById('sn-days').textContent=nearDiff<=0?'Overdue':nearDiff===1?'Tomorrow':'In '+nearDiff+' days';}
  document.getElementById('sn-pending').textContent=appData.projects.reduce((a,p)=>a+p.tasks.filter(t=>!t.done).length,0);
}

// ── Dashboard project list (compact) ──
function renderDashProjs() {
  document.getElementById('dash-projs').innerHTML = appData.projects.map(p=>{
    const pc=pct(p),t=p.tasks.length,d=p.tasks.filter(x=>x.done).length;
    return `<div class="proj-card" style="margin-bottom:8px">
      <div class="proj-head" onclick="goPortfolioProject(${p.id})">
        <div class="proj-dot" style="background:${statusDot[p.status]||'#888'}"></div>
        <div class="proj-name">${p.title}</div>
        <div class="proj-right">
          <div class="proj-pct">${pc}%</div>
          <div class="proj-pbar"><div class="proj-pbar-fill" style="background:${progColor(pc)};width:${pc}%"></div></div>
          <div style="font-size:10px;color:var(--text-3)">${d}/${t}</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── Portfolio ──
function renderPortfolio() {
  let ps=appData.projects;
  if(currentFilter==='high') ps=ps.filter(p=>p.priority==='high');
  else if(currentFilter!=='all') ps=ps.filter(p=>p.status===currentFilter);
  document.getElementById('proj-list').innerHTML = ps.map(p=>{
    const pc=pct(p),isOpen=expanded.has(p.id);
    const today=new Date(); today.setHours(0,0,0,0);
    let dlHtml='';
    if(p.deadline){const d=new Date(p.deadline),diff=Math.ceil((d-today)/86400000);dlHtml=`<span class="badge ${diff<=7?'b-ns':'b-og'}" style="margin-bottom:6px;display:inline-block">${diff<=0?'Overdue':diff===1?'Due tomorrow':'Due '+fmtDate(p.deadline)}</span><br>`;}
    const tasksHtml=p.tasks.length===0
      ?`<div class="empty-tasks">No actions yet — add one below.</div>`
      :p.tasks.map((t,ti)=>`<div class="task-item"><div class="task-cb ${t.done?'done':''}" onclick="toggleTask(${p.id},${ti})"></div><div class="task-info"><div class="task-text ${t.done?'done':''}">${t.text}</div>${t.target?`<div class="task-target">${t.target}</div>`:''}</div><button class="task-del" onclick="delTask(${p.id},${ti},event)">✕</button></div>`).join('');
    return `<div class="proj-card" id="pc-${p.id}">
      <div class="proj-head" onclick="toggleProj(${p.id})">
        <div class="proj-dot" style="background:${statusDot[p.status]||'#888'}"></div>
        <div class="proj-name">${p.title}</div>
        <div class="proj-right">
          <span class="badge ${priBadge[p.priority]}">${p.priority}</span>
          <span class="badge ${statusBadge[p.status]}">${statusLabel[p.status]}</span>
        </div>
      </div>
      <div class="proj-body ${isOpen?'open':''}">
        ${dlHtml}
        <div class="proj-body-progress">${pc}% · ${p.tasks.filter(t=>t.done).length}/${p.tasks.length} actions</div>
        <div class="pbar-bg" style="height:4px;background:var(--surface2);border-radius:3px;margin-bottom:10px"><div style="height:4px;border-radius:3px;background:${progColor(pc)};width:${pc}%"></div></div>
        ${tasksHtml}
        <div class="add-task-area">
          <input type="text" placeholder="Add action..." id="at-${p.id}" onkeydown="if(event.key==='Enter')addTask(${p.id})">
          <input type="text" placeholder="Target / date (optional)" id="tg-${p.id}" onkeydown="if(event.key==='Enter')addTask(${p.id})">
          <div class="add-row-btns">
            <button class="btn-add" onclick="addTask(${p.id})">+ Add action</button>
            <button class="btn-edit-proj" onclick="openEditProject(${p.id},event)">Edit</button>
          </div>
        </div>
      </div>
    </div>`;
  }).join('')||'<div style="font-size:13px;color:var(--text-3);padding:12px 0">No projects match this filter.</div>';
}

// ── Compass ──
function renderCompass() {
  const today=new Date(); today.setHours(0,0,0,0);
  let urgent=[],soon=[],bg=[];
  appData.projects.forEach(p=>{
    if(p.status==='completed') return;
    const pending=p.tasks.filter(t=>!t.done);
    if(p.deadline){const d=new Date(p.deadline),diff=Math.ceil((d-today)/86400000),dl=fmtDate(p.deadline);
      pending.forEach(t=>{if(diff<=7)urgent.push({proj:p.title,task:t.text,date:diff<=0?'Overdue':dl});else if(diff<=21)soon.push({proj:p.title,task:t.text,date:dl});});
    } else if(p.priority==='high'){pending.forEach(t=>urgent.push({proj:p.title,task:t.text,date:'No deadline'}));}
    else{pending.forEach(t=>bg.push({proj:p.title,task:t.text}));}
  });
  let html='';
  if(urgent.length===0&&soon.length===0) html=`<div class="compass-block cb-ok"><h3>All clear</h3><div style="font-size:13px;color:var(--accent)">No urgent items. Keep going.</div></div>`;
  else{
    if(urgent.length>0) html+=`<div class="compass-block cb-danger"><h3>Urgent — act now</h3>${urgent.map(i=>`<div class="c-item"><div class="c-proj">${i.proj}</div><div class="c-task">${i.task}</div><div class="c-date">${i.date}</div></div>`).join('')}</div>`;
    if(soon.length>0)   html+=`<div class="compass-block cb-warn"><h3>Coming up — 3 weeks</h3>${soon.map(i=>`<div class="c-item"><div class="c-proj">${i.proj}</div><div class="c-task">${i.task}</div><div class="c-date">${i.date}</div></div>`).join('')}</div>`;
  }
  if(bg.length>0) html+=`<div class="compass-block cb-neutral"><h3>Background</h3>${bg.slice(0,6).map(i=>`<div class="c-item"><div class="c-proj">${i.proj}</div><div class="c-task">${i.task}</div></div>`).join('')}${bg.length>6?`<div style="font-size:11px;color:var(--text-3);padding-top:6px">+${bg.length-6} more</div>`:''}</div>`;
  document.getElementById('compass-content').innerHTML=html;
}

// ── Report ──
function renderReport() {
  let total=0,done=0;
  appData.projects.forEach(p=>{total+=p.tasks.length;done+=p.tasks.filter(t=>t.done).length;});
  const overall=total===0?0:Math.round((done/total)*100);
  const pName=appData.period?.name||'Performance Period';
  const pRange=(appData.period?.start&&appData.period?.end)?fmtDate(appData.period.start)+' – '+fmtDate(appData.period.end):'Period not set';
  const highD=appData.projects.filter(p=>p.priority==='high'&&pct(p)===100).length;
  const highT=appData.projects.filter(p=>p.priority==='high').length;
  const projRows=appData.projects.map(p=>{
    const pc=pct(p);
    const doneTasks=p.tasks.filter(x=>x.done).map(t=>t.text);
    const pendTasks=p.tasks.filter(x=>!x.done).map(t=>t.text);
    return `<div class="rpr">
      <div class="rpr-top"><div class="rpr-title">${p.title}</div><div class="rpr-pct">${pc}%</div></div>
      <div class="rpr-bar-bg"><div class="rpr-bar" style="background:${progColor(pc)};width:${pc}%"></div></div>
      <div class="rpr-badges"><span class="badge ${priBadge[p.priority]}">${p.priority}</span><span class="badge ${statusBadge[p.status]}">${statusLabel[p.status]}</span></div>
      ${doneTasks.length>0?`<div class="rpr-tasks"><strong style="color:var(--accent)">Done:</strong> ${doneTasks.join(' · ')}</div>`:''}
      ${pendTasks.length>0?`<div class="rpr-tasks"><strong style="color:var(--warn)">Pending:</strong> ${pendTasks.join(' · ')}</div>`:''}
    </div>`;
  }).join('');
  document.getElementById('report-content').innerHTML=`
    <div class="report-header">
      <h2>${pName}</h2><p>${pRange}</p>
      <div class="rh-stats">
        <div class="rh-stat"><div class="rv">${overall}%</div><div class="rl">Completion</div></div>
        <div class="rh-stat"><div class="rv">${done}/${total}</div><div class="rl">Tasks done</div></div>
        <div class="rh-stat"><div class="rv">${appData.projects.filter(p=>pct(p)===100).length}/${appData.projects.length}</div><div class="rl">Projects done</div></div>
        <div class="rh-stat"><div class="rv">${highD}/${highT}</div><div class="rl">High priority done</div></div>
      </div>
    </div>
    <div class="report-section"><h3>All projects</h3>${projRows}</div>`;
}

// ── Navigation ──
window.nav = function(view, el, title) {
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('view-'+view).classList.add('active');
  el.classList.add('active');
  document.getElementById('top-title').textContent=title;
  document.getElementById('content').scrollTop=0;
  document.getElementById('fab').style.display=view==='portfolio'?'flex':'none';
  if(view==='compass') renderCompass();
  if(view==='report')  renderReport();
};

window.goPortfolioProject = function(id) {
  expanded.add(id);
  const btn=document.getElementById('nav-portfolio');
  nav('portfolio',btn,'Portfolio');
  btn.classList.add('active');
  setTimeout(()=>{ const el=document.getElementById('pc-'+id); if(el) el.scrollIntoView({behavior:'smooth',block:'start'}); },100);
};

window.filterP = function(f,btn) {
  currentFilter=f;
  document.querySelectorAll('.fpill').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderPortfolio();
};

window.toggleProj = function(id) {
  if(expanded.has(id)) expanded.delete(id); else expanded.add(id);
  renderPortfolio();
};

window.toggleTask = function(pid,ti) {
  const p=appData.projects.find(x=>x.id===pid);
  if(p){p.tasks[ti].done=!p.tasks[ti].done;scheduleSave();render();}
};

window.delTask = function(pid,ti,e) {
  e.stopPropagation();
  const p=appData.projects.find(x=>x.id===pid);
  if(p){p.tasks.splice(ti,1);expanded.add(pid);scheduleSave();render();}
};

window.addTask = function(pid) {
  const inp=document.getElementById('at-'+pid),tg=document.getElementById('tg-'+pid);
  if(!inp||!inp.value.trim()) return;
  const p=appData.projects.find(x=>x.id===pid);
  if(p){p.tasks.push({text:inp.value.trim(),done:false,target:tg?tg.value.trim():''});expanded.add(pid);scheduleSave();render();}
};

window.openAddProject = function() {
  editingId=null;
  document.getElementById('modal-title').textContent='New project';
  ['m-title','m-category','m-notes'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('m-status').value='not-started';
  document.getElementById('m-priority').value='medium';
  document.getElementById('m-deadline').value='';
  document.getElementById('del-btn').style.display='none';
  document.getElementById('proj-modal').classList.add('show');
  setTimeout(()=>document.getElementById('m-title').focus(),300);
};

window.openEditProject = function(id,e) {
  if(e) e.stopPropagation();
  const p=appData.projects.find(x=>x.id===id); if(!p) return;
  editingId=id;
  document.getElementById('modal-title').textContent='Edit project';
  document.getElementById('m-title').value=p.title;
  document.getElementById('m-status').value=p.status;
  document.getElementById('m-priority').value=p.priority;
  document.getElementById('m-deadline').value=p.deadline||'';
  document.getElementById('m-category').value=p.category||'';
  document.getElementById('m-notes').value=p.notes||'';
  document.getElementById('del-btn').style.display='block';
  document.getElementById('proj-modal').classList.add('show');
};

window.closeModal = function() { document.getElementById('proj-modal').classList.remove('show'); };

window.saveProject = function() {
  const title=document.getElementById('m-title').value.trim();
  if(!title){alert('Please enter a project title.');return;}
  if(editingId!==null){
    const p=appData.projects.find(x=>x.id===editingId);
    if(p){p.title=title;p.status=document.getElementById('m-status').value;p.priority=document.getElementById('m-priority').value;p.deadline=document.getElementById('m-deadline').value;p.category=document.getElementById('m-category').value.trim();p.notes=document.getElementById('m-notes').value.trim();}
  } else {
    appData.projects.push({id:nextId++,title,status:document.getElementById('m-status').value,priority:document.getElementById('m-priority').value,deadline:document.getElementById('m-deadline').value,category:document.getElementById('m-category').value.trim(),notes:document.getElementById('m-notes').value.trim(),tasks:[]});
  }
  closeModal();scheduleSave();render();
};

window.deleteProject = function() {
  if(!confirm('Delete this project and all its tasks?')) return;
  appData.projects=appData.projects.filter(p=>p.id!==editingId);
  closeModal();scheduleSave();render();
};

window.exportJSON = function() {
  const blob=new Blob([JSON.stringify(appData,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='khalid_tracker_backup_'+new Date().toISOString().slice(0,10)+'.json';
  a.click();URL.revokeObjectURL(a.href);
};

function render() {
  updateSnapshot(); updatePeriodBar();
  renderDashProjs(); renderPortfolio();
}

document.getElementById('proj-modal').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.getElementById('fab').style.display='none';
</script>
</body>
