<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ideas & Tasks — Khalid</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+3:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{min-height:100vh;background:#0f1117;font-family:'Georgia','Times New Roman',serif;color:#e8e2d5;display:flex;flex-direction:column;align-items:center;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#333;border-radius:4px;}
textarea,input{outline:none;font-family:inherit;}
.tab-btn{transition:all .25s;cursor:pointer;border:none;background:none;}
.tab-btn:hover{opacity:.85;}
.item-row{transition:background .2s;}
.item-row:hover{background:rgba(255,255,255,.04)!important;}
.icon-btn{transition:all .2s;cursor:pointer;border:none;background:none;opacity:.4;}
.icon-btn:hover{opacity:1;}
.add-btn{transition:all .2s;cursor:pointer;border:none;}
.add-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,0,0,.4);}
.add-btn:active{transform:translateY(0);}
.priority-chip{cursor:pointer;transition:all .15s;border:none;}
.priority-chip:hover{filter:brightness(1.2);}
.star-btn{cursor:pointer;border:none;background:none;transition:transform .2s;}
.star-btn:hover{transform:scale(1.25);}
.fade-in{animation:fadeIn .3s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}
#app{width:100%;max-width:560px;padding:0 16px 80px;}
.header{padding:40px 0 28px;text-align:center;}
.header-meta{font-size:11px;letter-spacing:4px;color:#6b6560;text-transform:uppercase;margin-bottom:8px;font-family:'Source Sans 3',sans-serif;}
.header-title{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;background:linear-gradient(135deg,#e8e2d5 0%,#c9a96e 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.header-counts{display:flex;justify-content:center;gap:20px;margin-top:14px;}
.count-gold{font-size:12px;color:#c9a96e;font-family:'Source Sans 3',sans-serif;}
.count-red{font-size:12px;color:#e05c5c;font-family:'Source Sans 3',sans-serif;}
.tabs{display:flex;background:#1a1d24;border-radius:12px;padding:4px;margin-bottom:24px;gap:4px;}
.tab-active{background:#252830;color:#e8e2d5;box-shadow:0 2px 8px rgba(0,0,0,.3);}
.tab-inactive{background:transparent;color:#6b6560;}
.tab-count{font-size:11px;opacity:.6;margin-left:4px;}
.input-box{background:#1a1d24;border-radius:14px;padding:16px;margin-bottom:20px;border:1px solid #252830;}
.spark-row{display:flex;align-items:flex-start;gap:10px;}
.spark-icon{padding-top:2px;color:#c9a96e;opacity:.8;flex-shrink:0;}
textarea{background:transparent;border:none;resize:none;color:#e8e2d5;font-size:15px;line-height:1.6;}
.capture-btn{background:linear-gradient(135deg,#c9a96e,#a07a45);border:none;color:#0f1117;font-weight:600;padding:8px 20px;border-radius:8px;font-size:13px;font-family:'Source Sans 3',sans-serif;box-shadow:0 2px 12px rgba(201,169,110,.25);}
.task-add-btn{background:#252830;border:1px solid #353840;color:#e8e2d5;font-weight:500;padding:7px 18px;border-radius:8px;font-size:13px;font-family:'Source Sans 3',sans-serif;}
.priority-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:12px;}
.priority-chips{display:flex;gap:6px;}
.item-row{background:#14171e;border-radius:12px;padding:14px 16px;margin-bottom:10px;border:1px solid #1f2229;display:flex;align-items:flex-start;gap:12px;}
.item-text{flex:1;min-width:0;}
.item-text p{margin:0;font-size:14.5px;line-height:1.65;color:#d8d2c5;font-family:'Georgia',serif;}
.item-date{display:flex;align-items:center;gap:4px;margin-top:7px;color:#4a4640;font-size:11px;font-family:'Source Sans 3',sans-serif;}
.filter-row{display:flex;gap:8px;margin-bottom:16px;}
.filter-active{background:#252830;color:#e8e2d5;border:1px solid #353840!important;}
.filter-inactive{background:transparent;color:#4a4640;border:1px solid transparent!important;}
.priority-badge{font-size:10px;padding:2px 7px;border-radius:4px;font-family:'Source Sans 3',sans-serif;font-weight:500;}
.empty{text-align:center;color:#3a3830;padding:40px 0;font-size:14px;font-family:'Source Sans 3',sans-serif;}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-meta">Quick Capture</div>
    <div class="header-title">Ideas &amp; Tasks</div>
    <div class="header-counts">
      <span class="count-gold" id="starred-count">✦ 0 starred ideas</span>
      <span class="count-red" id="pending-count">◆ 0 tasks pending</span>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn" id="tab-ideas" onclick="switchTab('ideas')" style="flex:1;padding:10px 0;border-radius:9px;font-family:'Source Sans 3',sans-serif;font-size:13px;">
      💡 Ideas <span class="tab-count" id="idea-count">0</span>
    </button>
    <button class="tab-btn" id="tab-tasks" onclick="switchTab('tasks')" style="flex:1;padding:10px 0;border-radius:9px;font-family:'Source Sans 3',sans-serif;font-size:13px;">
      ✓ Tasks <span class="tab-count" id="task-count">0</span>
    </button>
  </div>

  <!-- IDEAS PANEL -->
  <div id="panel-ideas">
    <div class="input-box">
      <div class="spark-row">
        <div class="spark-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L9.5 9.5 2 12l7.5 2.5L12 22l2.5-7.5L22 12l-7.5-2.5z"/></svg>
        </div>
        <textarea id="idea-input" rows="3" placeholder="What just sparked in your mind…" style="width:100%;" onkeydown="ideaKey(event)"></textarea>
      </div>
      <div style="display:flex;justify-content:flex-end;margin-top:10px;">
        <button class="add-btn capture-btn" onclick="addIdea()">Capture →</button>
      </div>
    </div>
    <div id="ideas-list"></div>
  </div>

  <!-- TASKS PANEL -->
  <div id="panel-tasks" style="display:none;">
    <div class="input-box">
      <textarea id="task-input" rows="2" placeholder="Something important to do…" style="width:100%;" onkeydown="taskKey(event)"></textarea>
      <div class="priority-row">
        <div class="priority-chips">
          <button class="priority-chip" id="chip-high" onclick="setPriority('high')" style="padding:4px 10px;border-radius:6px;font-size:11px;font-family:'Source Sans 3',sans-serif;">High</button>
          <button class="priority-chip" id="chip-medium" onclick="setPriority('medium')" style="padding:4px 10px;border-radius:6px;font-size:11px;font-family:'Source Sans 3',sans-serif;">Medium</button>
          <button class="priority-chip" id="chip-low" onclick="setPriority('low')" style="padding:4px 10px;border-radius:6px;font-size:11px;font-family:'Source Sans 3',sans-serif;">Low</button>
        </div>
        <button class="add-btn task-add-btn" onclick="addTask()">Add Task</button>
      </div>
    </div>
    <div class="filter-row">
      <button class="tab-btn" onclick="setFilter('all')" id="f-all" style="padding:5px 14px;border-radius:20px;font-size:12px;font-family:'Source Sans 3',sans-serif;text-transform:capitalize;">All</button>
      <button class="tab-btn" onclick="setFilter('active')" id="f-active" style="padding:5px 14px;border-radius:20px;font-size:12px;font-family:'Source Sans 3',sans-serif;text-transform:capitalize;">Active</button>
      <button class="tab-btn" onclick="setFilter('done')" id="f-done" style="padding:5px 14px;border-radius:20px;font-size:12px;font-family:'Source Sans 3',sans-serif;text-transform:capitalize;">Done</button>
    </div>
    <div id="tasks-list"></div>
  </div>
</div>

<script>
const KEYS = { ideas: 'khalid_ideas_v1', tasks: 'khalid_tasks_v1' };
const PC = { high:'#e05c5c', medium:'#e09b3a', low:'#4caf8a' };
const PL = { high:'High', medium:'Medium', low:'Low' };

let ideas = [], tasks = [];
let currentTab = 'ideas';
let currentPriority = 'medium';
let currentFilter = 'all';

function load() {
  try { ideas = JSON.parse(localStorage.getItem(KEYS.ideas)) || []; } catch { ideas = []; }
  try { tasks = JSON.parse(localStorage.getItem(KEYS.tasks)) || []; } catch { tasks = []; }
}
function save() {
  localStorage.setItem(KEYS.ideas, JSON.stringify(ideas));
  localStorage.setItem(KEYS.tasks, JSON.stringify(tasks));
}
function fmtDate(iso) {
  return new Date(iso).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
}

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('panel-ideas').style.display = tab==='ideas'?'block':'none';
  document.getElementById('panel-tasks').style.display = tab==='tasks'?'block':'none';
  ['ideas','tasks'].forEach(t => {
    const btn = document.getElementById('tab-'+t);
    btn.className = 'tab-btn ' + (t===tab?'tab-active':'tab-inactive');
  });
  if(tab==='ideas') document.getElementById('idea-input').focus();
  else document.getElementById('task-input').focus();
}

function setPriority(p) {
  currentPriority = p;
  ['high','medium','low'].forEach(x => {
    const c = document.getElementById('chip-'+x);
    if(x===p) {
      c.style.background = PC[x]+'30';
      c.style.color = PC[x];
      c.style.border = '1px solid '+PC[x]+'60';
    } else {
      c.style.background = '#1f2229';
      c.style.color = '#555';
      c.style.border = '1px solid #2a2d35';
    }
  });
}

function setFilter(f) {
  currentFilter = f;
  ['all','active','done'].forEach(x => {
    const b = document.getElementById('f-'+x);
    b.className = 'tab-btn ' + (x===f?'filter-active':'filter-inactive');
  });
  renderTasks();
}

function ideaKey(e) { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();addIdea();} }
function taskKey(e) { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();addTask();} }

function addIdea() {
  const text = document.getElementById('idea-input').value.trim();
  if(!text) return;
  ideas.unshift({id:Date.now(),text,createdAt:new Date().toISOString(),starred:false});
  save(); renderIdeas(); updateCounts();
  document.getElementById('idea-input').value='';
  document.getElementById('idea-input').focus();
}

function toggleStar(id) {
  const i = ideas.find(x=>x.id===id);
  if(i) i.starred = !i.starred;
  save(); renderIdeas(); updateCounts();
}
function deleteIdea(id) {
  ideas = ideas.filter(x=>x.id!==id);
  save(); renderIdeas(); updateCounts();
}

function addTask() {
  const text = document.getElementById('task-input').value.trim();
  if(!text) return;
  tasks.unshift({id:Date.now(),text,priority:currentPriority,done:false,createdAt:new Date().toISOString()});
  save(); renderTasks(); updateCounts();
  document.getElementById('task-input').value='';
  document.getElementById('task-input').focus();
}
function toggleTask(id) {
  const t = tasks.find(x=>x.id===id);
  if(t) t.done = !t.done;
  save(); renderTasks(); updateCounts();
}
function deleteTask(id) {
  tasks = tasks.filter(x=>x.id!==id);
  save(); renderTasks(); updateCounts();
}

function updateCounts() {
  const starred = ideas.filter(i=>i.starred).length;
  const pending = tasks.filter(t=>!t.done).length;
  document.getElementById('starred-count').textContent = '✦ '+starred+' starred idea'+(starred!==1?'s':'');
  document.getElementById('pending-count').textContent = '◆ '+pending+' task'+(pending!==1?'s':'')+' pending';
  document.getElementById('idea-count').textContent = ideas.length;
  document.getElementById('task-count').textContent = pending;
}

function renderIdeas() {
  const el = document.getElementById('ideas-list');
  if(!ideas.length) { el.innerHTML='<div class="empty">Your next idea is just a thought away</div>'; return; }
  el.innerHTML = ideas.map(idea => `
    <div class="item-row fade-in">
      <button class="star-btn" onclick="toggleStar(${idea.id})" style="padding-top:2px;flex-shrink:0;">
        <span style="font-size:16px;color:${idea.starred?'#c9a96e':'#333'}">${idea.starred?'★':'☆'}</span>
      </button>
      <div class="item-text">
        <p>${escHtml(idea.text)}</p>
        <div class="item-date">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          ${fmtDate(idea.createdAt)}
        </div>
      </div>
      <button class="icon-btn" onclick="deleteIdea(${idea.id})" style="color:#e05c5c;padding-top:3px;flex-shrink:0;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
      </button>
    </div>
  `).join('');
}

function renderTasks() {
  const el = document.getElementById('tasks-list');
  const filtered = tasks.filter(t => {
    if(currentFilter==='active') return !t.done;
    if(currentFilter==='done') return t.done;
    return true;
  });
  if(!filtered.length) {
    el.innerHTML='<div class="empty">'+(currentFilter==='done'?'Nothing completed yet':'Clear slate — well done')+'</div>';
    return;
  }
  el.innerHTML = filtered.map(task => `
    <div class="item-row fade-in" style="opacity:${task.done?.5:1}">
      <button class="icon-btn" onclick="toggleTask(${task.id})" style="
        width:22px;height:22px;border-radius:6px;flex-shrink:0;
        border:1.5px solid ${task.done?'#4caf8a':'#353840'};
        background:${task.done?'#4caf8a20':'transparent'};
        color:#4caf8a;display:flex;align-items:center;justify-content:center;
        padding:0;margin-top:1px;opacity:${task.done?1:.5};">
        ${task.done?'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>':''}
      </button>
      <div class="item-text">
        <p style="color:${task.done?'#5a5650':'#d8d2c5'};text-decoration:${task.done?'line-through':'none'}">${escHtml(task.text)}</p>
        <div style="display:flex;align-items:center;gap:8px;margin-top:6px;">
          <span class="priority-badge" style="background:${PC[task.priority]}20;color:${PC[task.priority]};border:1px solid ${PC[task.priority]}30;">${PL[task.priority]}</span>
          <span class="item-date">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            ${fmtDate(task.createdAt)}
          </span>
        </div>
      </div>
      <button class="icon-btn" onclick="deleteTask(${task.id})" style="color:#e05c5c;padding-top:3px;flex-shrink:0;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
      </button>
    </div>
  `).join('');
}

function escHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function init() {
  load();
  switchTab('ideas');
  setPriority('medium');
  setFilter('all');
  renderIdeas();
  renderTasks();
  updateCounts();
}

init();
</script>
</body>
</html>
